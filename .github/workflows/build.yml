name: Build EChest Forge Mod

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'zulu'

    # Forge-ning o'chib ketgan faylini arxivdan yuklab, Gradle keshiga joylashtirish
    - name: Fix Missing Forge Userdev Jar
      run: |
        mkdir -p ~/.gradle/caches/minecraft/net/minecraftforge/forge/1.12.2-14.23.5.2860
        curl -L -o ~/.gradle/caches/minecraft/net/minecraftforge/forge/1.12.2-14.23.5.2860/forge-1.12.2-14.23.5.2860-userdev.jar https://repo.cleanroommc.com/releases/net/minecraftforge/forge/1.12.2-14.23.5.2860/forge-1.12.2-14.23.5.2860-userdev.jar

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 4.9

    - name: Build with Gradle
      run: gradle build --build-file build.gradle --no-daemon
