name: Build EChest Forge Mod

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 4.9

    # --build-file build.gradle orqali aynan shu faylni ishlatishni majburlaymiz
    - name: Build with Gradle
      run: gradle build --build-file build.gradle --no-daemon
