name: Build EChest Forge Mod

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'zulu'

    # ForgeGradle 2.3 dagi barcha buzilgan/o'chgan dependency xatolarini tuzatuvchi maxsus action
    - name: Setup ForgeGradle Fixes
      uses: anatawa12/setup-forgegradle@v1

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 4.9

    - name: Build with Gradle
      run: gradle build --build-file build.gradle --no-daemon
